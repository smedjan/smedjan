[package]
name = "andreai"
version = "0.1.0"
edition = "2021"
description = "Pure Rust AI engine — own architecture, own training, own tokenizer"

[dependencies]
# Layer 1: thin FFI bindings to Metal GPU API (~50KB, just type definitions)
objc2 = "0.6"
objc2-foundation = "0.3"
objc2-metal = "0.3"

rand = "0.8"
memmap2 = "0.9"
clap = { version = "4", features = ["derive"] }
byteorder = "1"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
