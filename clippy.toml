# Project-wide lint POLICY (visible config, not per-case #[allow] suppression).
#
# GPU kernel dispatch wrappers (metal/compute.rs) pass many buffer + dimension arguments by
# nature. Most are 8–15 args; three disabled fused-path kernels are larger and pass every buffer
# explicitly: gpu_fused_pre_attn (22), gpu_fused_post_attn_ffn (18), gpu_persistent_layer (31).
# These are only reached from the `false`-gated fast paths in model.rs (currently disabled). The
# threshold covers the dispatch layer so it reads as plain positional kernel args; bundling every
# buffer into per-kernel structs would add lifetime-laden boilerplate to dead code.
too-many-arguments-threshold = 32

# The clap `Commands` subcommand enum holds each subcommand's args inline (idiomatic clap derive);
# the largest variant (train) is naturally bigger than unit-like ones. Boxing fights clap's derive,
# so the size-difference threshold is raised rather than restructuring the CLI.
enum-variant-size-threshold = 4096
